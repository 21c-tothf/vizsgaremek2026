# Adatforras beallitas
spring.datasource.url=jdbc:mysql://localhost:3306/used_cars_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Adatmodell beallitas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:mysql-sample-data.sql

# JWT beallitas
jwt.secret=usedCarsJwtSecretKeyChangeMeInProduction1234567890
jwt.expiration=3600000

# Fajlfeltoltes beallitas
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.static-locations=classpath:/static/,file:frontend/dist/,file:uploads/

# Szerver port
server.port=8080